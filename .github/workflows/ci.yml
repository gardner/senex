# CI: the same checks you can run locally with
#   pnpm typecheck && pnpm lint && pnpm test && pnpm build
# Deployment is NOT done here — Cloudflare Workers Builds deploys from GitHub
# directly. See README.md for the deployment shape.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # version is read from packageManager in package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check migrations
        run: pnpm check:migrations

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
